<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>연구비 정산 검색 비서</title>
    <meta
      name="description"
      content="업로드된 연구비 지침과 매뉴얼에서 회의비, 출장여비, 특강비, 자문료, 기자재 구매, 정산 증빙 기준을 검색합니다."
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="검색 범주">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">RF</div>
          <div>
            <h1>연구비 정산 비서</h1>
            <p>근거 기반 검색</p>
          </div>
        </div>

        <div class="status-panel">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="kbStatus">자료 불러오는 중</span>
        </div>

        <nav class="topic-list" aria-label="빠른 질문">
          <button type="button" data-query="출장 여비 정산시 필요한 서류 알려줘">출장여비 서류</button>
          <button type="button" data-query="해외학회 출장 국외여비 정산 증빙 서류">해외출장</button>
          <button type="button" data-query="국내학회 출장 국내여비 숙박 교통 일비 식비 정산">국내출장</button>
          <button type="button" data-query="2026 연구재단 회의비 주말 사용 가능 사전결재 내부참석자">회의비</button>
          <button type="button" data-query="특강비 전문가활용비 강사료 증빙 메뉴">특강비</button>
          <button type="button" data-query="자문료 전문가활용비 자문확인서 지급 기준">자문료</button>
          <button type="button" data-query="2026 연구재료비 100만원 이하 검수확인서 증빙 간소화">연구재료비</button>
          <button type="button" data-query="2026 논문게재료 연구개발기간 종료 후 2년 APC 정산">논문게재료</button>
          <button type="button" data-query="야근 특근 식대 메뉴 증빙 1만원">야근·특근 식대</button>
          <button type="button" data-query="맥미니 200만원 중앙구매 컴퓨터 연구활동비">기자재 구매</button>
        </nav>
      </aside>

      <main class="main-panel">
        <section class="chat-panel" aria-label="검색 대화">
          <div class="chat-header">
            <div>
              <p class="eyebrow">Research Fund Assistant</p>
              <h2>질문을 입력하면 근거와 절차를 함께 찾습니다</h2>
            </div>
            <button id="clearButton" type="button" class="icon-button" title="대화 지우기" aria-label="대화 지우기">
              x
            </button>
          </div>

          <div id="conversation" class="conversation" aria-live="polite">
            <article class="message assistant">
              <div class="bubble">
                <strong>검색 준비 완료</strong>
                <p>회의비, 출장여비, 야근·특근 식대, 자문료, 특강비, 기자재 구매처럼 찾고 싶은 항목을 입력하세요.</p>
              </div>
            </article>
          </div>

          <form id="searchForm" class="composer">
            <label class="sr-only" for="queryInput">질문</label>
            <input
              id="queryInput"
              type="search"
              autocomplete="off"
              placeholder="예: 출장 여비 정산시 필요한 서류 알려줘"
            />
            <button type="submit">검색</button>
          </form>
        </section>

        <section class="source-panel" aria-label="검색 근거">
          <div class="panel-heading">
            <h2>근거 자료</h2>
            <span id="resultCount">0개</span>
          </div>
          <div id="sources" class="source-list"></div>
        </section>
      </main>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
