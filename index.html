    :root{--bg:#f6f7f9;--panel:#fff;--soft:#f1f5f9;--text:#172033;--muted:#647084;--line:#dbe2ea;--blue:#2563eb;--blue2:#1d4ed8;--green:#0f766e;--red:#b42318;--shadow:0 14px 34px rgba(24,33,52,.11)}*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;word-break:keep-all}.app{display:grid;grid-template-columns:292px minmax(0,1fr);min-height:100vh}.side{background:#111827;color:#f9fafb;padding:24px 18px}.brand{display:grid;grid-template-columns:44px minmax(0,1fr);gap:12px;align-items:center;margin-bottom:18px}.mark{display:grid;place-items:center;width:44px;height:44px;border-radius:8px;background:var(--green);font-weight:800}.brand h1{font-size:18px;line-height:1.25;margin:0}.brand p{margin:4px 0 0;color:#b9c2d2;font-size:13px}.status{border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:11px;background:rgba(255,255,255,.06);font-size:13px;color:#dbeafe}.topics{display:grid;gap:8px;margin-top:18px}.topics button{min-height:42px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.05);color:#fff;text-align:left;padding:10px 12px;cursor:pointer;line-height:1.35}.topics button:hover,.topics button:focus-visible{background:rgba(37,99,235,.25);outline:2px solid rgba(96,165,250,.55)}.main{display:grid;grid-template-columns:minmax(0,1fr)400px;gap:18px;padding:18px}.chat,.sources{min-width:0;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow);min-height:calc(100vh - 36px)}.chat{display:grid;grid-template-rows:auto minmax(0,1fr) auto}.head{display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid var(--line);padding:20px 22px}.eyebrow{margin:0 0 4px;color:var(--green);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0}.head h2,.source-head h2{margin:0;font-size:20px;line-height:1.35}.clear{flex:0 0 auto;width:36px;height:36px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--muted);cursor:pointer;font-size:18px}.clear:hover{color:var(--red);border-color:#fecaca}.conv{overflow:auto;padding:22px}.msg{display:flex;margin-bottom:16px}.msg.user{justify-content:flex-end}.bubble{width:min(800px,100%);border-radius:8px;padding:14px 16px;line-height:1.58}.assistant .bubble{border:1px solid var(--line);background:var(--soft)}.user .bubble{background:var(--blue);color:#fff}.bubble p{margin:8px 0 0}.grid{display:grid;gap:8px;margin-top:10px}.row{display:grid;grid-template-columns:124px minmax(0,1fr);gap:10px;border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}.row b{color:var(--muted)}.composer{display:grid;grid-template-columns:minmax(0,1fr)92px;gap:10px;border-top:1px solid var(--line);padding:16px;background:#fff;border-radius:0 0 8px 8px}.composer input{width:100%;min-height:46px;border:1px solid var(--line);border-radius:8px;padding:0 14px;color:var(--text)}.composer input:focus{border-color:var(--blue);outline:3px solid rgba(37,99,235,.15)}.composer button{border:0;border-radius:8px;background:var(--blue);color:#fff;font-weight:800}.composer button:hover{background:var(--blue2)}.sources{display:grid;grid-template-rows:auto minmax(0,1fr)}.source-head{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);padding:20px}.source-list{overflow:auto;padding:14px}.card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:13px;margin-bottom:10px}.card h3{margin:0 0 5px;font-size:14px;line-height:1.35}.meta{display:flex;flex-wrap:wrap;gap:6px;color:var(--muted);font-size:12px}.card p{margin:10px 0 0;color:#374151;font-size:13px;line-height:1.55}.empty{color:var(--muted);padding:18px;text-align:center}@media(max-width:1080px){.app{grid-template-columns:1fr}.side{padding:18px;border-bottom:1px solid #243044}.topics{grid-template-columns:repeat(2,minmax(0,1fr))}.main{grid-template-columns:1fr}.chat,.sources{min-height:auto}.sources{max-height:none}}@media(max-width:640px){body{font-size:15px}.side{padding:14px}.brand{grid-template-columns:38px 1fr}.mark{width:38px;height:38px}.brand h1{font-size:16px}.topics{grid-template-columns:1fr}.main{padding:10px;gap:10px}.head{padding:14px}.head h2{font-size:17px}.conv{padding:12px}.bubble{padding:12px}.row{grid-template-columns:1fr;gap:4px;padding:10px}.composer{grid-template-columns:1fr;padding:10px;position:sticky;bottom:0}.composer button{min-height:44px}.source-head{padding:14px}.source-list{padding:10px}.chat,.sources{border-radius:8px;box-shadow:none}.card{padding:11px}}

<div class="app">

<script>
const INTENTS=[
{id:'travel_docs',topic:'출장 여비 정산 필요 서류',priority:100,keys:'출장 출장여비 출장비 여비 여비정산 정산 정산시 서류 증빙 제출서류 출장신청서 출장복명서 여비정산서 국내여비 국외여비 운임 숙박비 일비 식비 학회 출장',source:'연구관리시스템 매뉴얼 / 연구비관리 업무처리 지침 / 출장 정산 업로드 자료',answer:{'결론':'출장 여비 정산 질문은 야근·특근 식대가 아니라 국내여비 또는 국외여비 정산으로 처리합니다. 필요한 서류는 출장 승인, 여비 산출, 실제 지출 증빙, 출장 결과보고를 확인하는 자료입니다.','공통 서류':'출장신청서 또는 공무국외출장 허가문서, 여비정산서, 출장복명서 또는 결과보고서, 카드전표·계좌이체증명·영수증 등 지출 증빙이 필요합니다.','국내출장':'운임 영수증, 숙박비 영수증, 학회 프로그램 또는 참가확인 자료, 여비집행내역서를 함께 확인합니다.','해외출장':'공무국외출장 허가문서, 항공 E-ticket과 탑승권 또는 항공운임 영수증, 숙박비 영수증, 출입국사실증명, 국외출장보고서, 학회 프로그램·참가확인서·발표자료가 필요합니다.','중복 확인':'학회 제공 식사, 기내식, 숙박 포함 조식, 회의비와 중복되는 식비는 감액 또는 제외 여부를 확인해야 합니다.'}},
{id:'overseas_travel',topic:'해외출장·국외여비',priority:90,keys:'해외출장 국외출장 해외학회 국외여비 공무국외 출입국 환율 항공 e-ticket 이티켓 여권 국외출장보고서 발표자료',source:'연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A / 공무국외출장 자료',answer:{'결론':'해외학회 비용은 학회등록비와 국외여비를 분리하여 처리합니다.','필요 서류':'공무국외출장 허가문서 또는 출장신청서, 항공 E-ticket과 탑승권, 항공운임 영수증, 숙박비 영수증, 출입국사실증명, 국외출장보고서가 필요합니다.','학회 증빙':'학회 프로그램, 참가확인서 또는 명찰, 발표자료 또는 논문초록, 발표 일정표를 함께 제출합니다.','정산 항목':'항공료, 국내·국외 이동비, 숙박비, 일비, 식비, 환율 기준일, 제공식 차감 여부를 확인합니다.','주의':'기내식, 학회 제공 식사, 숙박 포함 조식, 타 재원 지원액은 중복 지급되지 않도록 감액 또는 제외합니다.'}},
{id:'domestic_travel',topic:'국내출장·국내여비',priority:85,keys:'국내출장 국내학회 국내여비 관내출장 관외출장 운임 숙박 교통 일비 식비 출장신청서 출장복명서 학회 프로그램 참가확인서',source:'연구관리시스템 매뉴얼 / 연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A',answer:{'결론':'국내 학회 출장비는 학회등록비와 국내여비를 분리하여 정산합니다.','필요 서류':'출장신청서, 출장복명서 또는 결과보고, 운임 영수증, 숙박비 영수증, 학회 프로그램 또는 참가확인서, 여비집행내역서가 필요합니다.','정산 항목':'교통비, 숙박비, 일비, 식비를 구분하여 입력하고 실제 지급 가능액은 직급, 출장지, 제공식 여부에 따라 확인합니다.','주의':'학회 제공 식사, 출장지 제공 식사, 회의비 집행 식사는 식비 중복 여부를 확인해야 합니다.'}},
{id:'night_meal',topic:'야근·특근 식대',priority:70,keys:'야근 특근 식대 초과근무 야근식대 특근식대 야간 주말 카드매출전표 1만원',source:'연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A',answer:{'결론':'업로드 자료에서 확인되는 항목은 현금성 야근수당이 아니라 야근·특근 식대입니다. 출장 여비와 별도 항목입니다.','금액 기준':'1인당 10,000원 이내입니다.','필요 서류':'카드매출전표 또는 계좌이체증명, 지출결의서, 초과근무내역 확인서류 또는 초과근무일지가 필요합니다.','주의':'출장비 식비, 회의비, 평일 점심 식대와 중복되는 집행은 부적정 처리될 수 있습니다.'}},
{id:'meeting',topic:'회의비',priority:60,keys:'회의비 회의 주말 사전결재 외부참석자 회의록 참석자명단 식사비 다과비 23시',source:'연구관리시스템 매뉴얼 / 연구비관리 업무처리 지침',answer:{'결론':'회의비는 연구과제와 직접 관련된 실제 회의에 대해 사전결재와 증빙을 갖추어 정산합니다.','필요 서류':'회의 개최 계획 또는 내부결재, 회의록, 참석자 명단, 카드전표 또는 계좌이체증명이 필요합니다.','금액 기준':'식사비는 1인당 50,000원 이내, 다과비는 1인당 6,000원 이내 기준으로 확인됩니다.','주의':'출장 식비와 회의비가 중복되지 않도록 확인해야 합니다.'}},
{id:'expert',topic:'전문가 활용비·자문료·특강비',priority:55,keys:'자문료 자문 특강비 특강 강사료 강연료 전문가 전문가활용비 자문확인서 자문보고서 강연료청구서 이력서 통장사본 개인정보동의서',source:'연구비관리 업무처리 지침 / 연구관리시스템 매뉴얼',answer:{'결론':'자문료와 특강비는 연구활동비의 전문가 활용비 성격으로 처리합니다.','필요 서류':'특강 또는 자문 계획서, 청구서, 이력서, 통장사본, 개인정보 동의서, 자문보고서 또는 강의자료, 진행 사진이나 참석자 서명부가 필요합니다.','금액 기준':'업로드 자료 기준으로 국내 특강비·강사료는 600,000원 이내, 국내 자문료는 300,000원 이내 기준이 확인됩니다.','주의':'참여연구원이나 동일 연구과제 내부 구성원에게 지급 가능한지 먼저 확인해야 합니다.'}},
{id:'conference_fee',topic:'학회등록비',priority:50,keys:'학회등록비 학회비 등록비 참가비 참가확인서 프로그램 발표자료 논문초록 명찰 영수증',source:'연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A / 출장 정산 자료',answer:{'결론':'학회등록비는 출장 여비와 분리하여 학회 참가 비용으로 처리합니다.','필요 서류':'등록비 영수증, 참가자 성명 확인 자료, 학회 프로그램, 참가확인서 또는 명찰, 발표자료 또는 논문초록이 필요합니다.','주의':'종신 학회비나 과제와 직접 관련 없는 학회비는 지원이 제한될 수 있습니다.'}},
{id:'equipment',topic:'기자재·컴퓨터 구매',priority:45,keys:'기자재 장비 맥미니 컴퓨터 중앙구매 물품구매 비교견적서 검수조서 연구활동비 연구시설장비비 200만원',source:'연구지원INFO / 연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A',answer:{'결론':'컴퓨터와 장비는 연구계획서의 계상 비목과 실제 연구 목적성을 먼저 확인한 뒤 구매 절차를 진행합니다.','필요 서류':'물품구매요청서, 견적서, 비교견적서, 물품 규격서, 연구계획서 관련 근거, 거래명세서, 검수조서, 물품 사진이 필요합니다.','주의':'연구계획서에 미계상된 장비나 범용성이 큰 사무기기는 사전 승인 또는 비목 확인이 필요합니다.'}},

const conv=document.getElementById('conv'),src=document.getElementById('sources'),count=document.getElementById('count'),form=document.getElementById('form'),input=document.getElementById('q');
function norm(s){return String(s||'').toLowerCase().replace(/[^0-9a-z가-힣]/g,'')}
function terms(q){return q.split(/\s+/).map(x=>x.trim()).filter(Boolean)}
function explicitRoute(q){const c=norm(q);if(/야근|특근|초과근무|야근식대|특근식대/.test(c))return 'night_meal';if(/출장|여비|출장비|국내여비|국외여비/.test(c)&&/정산|서류|증빙|필요|제출/.test(c))return 'travel_docs';if(/해외|국외|공무국외|출입국/.test(c))return 'overseas_travel';if(/국내|관내|관외/.test(c)&&/출장|여비|학회/.test(c))return 'domestic_travel';if(/회의비|회의록|외부참석자|사전결재/.test(c))return 'meeting';if(/자문|특강|강사료|강연료|전문가/.test(c))return 'expert';if(/학회등록비|등록비|참가비|학회비/.test(c))return 'conference_fee';if(/기자재|장비|맥미니|컴퓨터|중앙구매|물품구매/.test(c))return 'equipment';if(/예산|잔액|집행률|비목|세목|초과집행|증빙누락/.test(c))return 'budget';return null}
function score(q,item){const t=terms(q);const c=norm(q);const hay=norm(item.topic+' '+item.keys+' '+Object.values(item.answer).join(' '));let s=item.priority||0;t.forEach(x=>{const nx=norm(x);if(nx&&hay.includes(nx))s+=12});if(hay.includes(c))s+=40;const routed=explicitRoute(q);if(routed===item.id)s+=400;if(routed&&routed!==item.id)s-=140;if(!/야근|특근|초과근무/.test(c)&&item.id==='night_meal')s-=260;if(/야근|특근|초과근무/.test(c)&&item.id==='travel_docs')s-=120;return s}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function add(role,html){const a=document.createElement('article');a.className='msg '+role;a.innerHTML='<div class="bubble">'+html+'</div>';conv.appendChild(a);conv.scrollTop=conv.scrollHeight}
function answer(q){add('user',esc(q));const results=INTENTS.map(k=>({...k,score:score(q,k)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);const top=results[0]||INTENTS[0];let html='<strong>'+esc(top.topic)+'</strong><div class="grid">';for(const [k,v] of Object.entries(top.answer)){html+='<div class="row"><b>'+esc(k)+'</b><span>'+esc(v)+'</span></div>'}html+='</div><p><strong>근거:</strong> '+esc(top.source)+'</p>';add('assistant',html);render(results.length?results:[top])}
function render(items){count.textContent=items.length+'건';src.innerHTML=items.map(x=>'<div class="card"><h3>'+esc(x.topic)+'</h3><div class="meta"><span>점수 '+(x.score||0)+'</span><span>'+esc(x.source)+'</span></div><p>'+esc(Object.values(x.answer).slice(0,2).join(' '))+'</p></div>').join('')||'<div class="empty">검색 결과 없음</div>'}
form.addEventListener('submit',e=>{e.preventDefault();const q=input.value.trim();if(q)answer(q)});document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{input.value=b.dataset.q;answer(input.value)});document.getElementById('clear').onclick=()=>{conv.innerHTML='<article class="msg assistant"><div class="bubble"><strong>검색 준비 완료</strong><p>연구비 관련 질문을 입력하세요.</p></div></article>';render([])};render([]);
</script>
