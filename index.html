const KB=[
{topic:'출장 여비 정산 필요 서류',priority:100,keys:'출장 출장여비 출장비 여비 여비정산 정산 정산시 필요 필요한 서류 증빙 증빙서류 제출서류 출장신청서 출장복명서 여비정산서 국내여비 국외여비 운임 숙박비 일비 식비 학회 출장',source:'연구관리시스템 매뉴얼 / 연구비관리 업무처리 지침 / 출장 정산 서류 업로드 자료',answer:{'결론':'출장 여비 정산 질문은 야근·특근 식대가 아니라 국내여비 또는 국외여비 정산으로 처리합니다. 필요한 서류는 출장 승인, 여비 산출, 실제 지출 증빙, 출장 결과보고를 확인하는 자료입니다.','공통 서류':'출장신청서 또는 공무국외출장 허가문서, 여비정산서, 출장복명서 또는 결과보고서, 카드전표·계좌이체증명·영수증 등 지출 증빙이 필요합니다.','국내출장':'운임 영수증, 숙박비 영수증, 학회 프로그램 또는 참가확인 자료, 여비집행내역서를 함께 확인합니다.','해외출장':'공무국외출장 허가문서, 항공 E-ticket과 탑승권 또는 항공운임 영수증, 숙박비 영수증, 출입국사실증명, 국외출장보고서, 학회 프로그램·참가확인서·발표자료가 필요합니다.','학회 출장':'학회등록비는 여비와 분리하여 등록비 영수증, 참가자 성명 확인 자료, 학회 프로그램, 발표 초록 또는 발표자료, 참가확인서를 붙입니다.','중복 확인':'학회 제공 식사, 기내식, 숙박 포함 조식, 회의비와 중복되는 식비는 정산 때 감액 또는 제외 여부를 확인해야 합니다.'}},
{topic:'해외출장·국외여비',priority:90,keys:'해외출장 국외출장 해외학회 국외여비 공무국외 출입국 환율 항공 e-ticket 이티켓 여권 국외출장보고서 발표자료',source:'연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A / 공무국외출장 자료',answer:{'결론':'해외학회 비용은 학회등록비와 국외여비를 분리하여 처리합니다.','필요 서류':'공무국외출장 허가문서 또는 출장신청서, 항공 E-ticket과 탑승권, 항공운임 영수증, 숙박비 영수증, 출입국사실증명, 국외출장보고서가 필요합니다.','학회 증빙':'학회 프로그램, 참가확인서 또는 명찰, 발표자료 또는 논문초록, 발표 일정표를 함께 제출합니다.','정산 항목':'항공료, 국내·국외 이동비, 숙박비, 일비, 식비, 환율 기준일, 제공식 차감 여부를 확인합니다.','주의':'기내식, 학회 제공 식사, 숙박 포함 조식, 타 재원 지원액은 중복 지급되지 않도록 감액 또는 제외합니다.'}},

{topic:'야근·특근 식대',priority:70,keys:'야근 특근 식대 초과근무 야근식대 특근식대 야간 주말 카드매출전표 1만원',source:'연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A',answer:{'결론':'업로드 자료에서 확인되는 항목은 현금성 야근수당이 아니라 야근·특근 식대입니다. 출장 여비와 별도 항목입니다.','금액 기준':'1인당 10,000원 이내입니다.','필요 서류':'카드매출전표 또는 계좌이체증명, 지출결의서, 초과근무내역 확인서류 또는 초과근무일지가 필요합니다.','주의':'출장비 식비, 회의비, 평일 점심 식대와 중복되는 집행은 부적정 처리될 수 있습니다.'}},
{topic:'회의비',priority:60,keys:'회의비 회의 주말 사전결재 외부참석자 회의록 참석자명단 식사비 다과비 23시',source:'연구관리시스템 매뉴얼 / 연구비관리 업무처리 지침',answer:{'결론':'회의비는 연구과제와 직접 관련된 실제 회의에 대해 사전결재와 증빙을 갖추어 정산합니다.','필요 서류':'회의 개최 계획 또는 내부결재, 회의록, 참석자 명단, 카드전표 또는 계좌이체증명이 필요합니다.','금액 기준':'식사비는 1인당 50,000원 이내, 다과비는 1인당 6,000원 이내 기준으로 확인됩니다.','주의':'출장 식비와 회의비가 중복되지 않도록 확인해야 합니다.'}},
{topic:'전문가 활용비·자문료·특강비',priority:55,keys:'자문료 자문 특강비 특강 강사료 강연료 전문가 전문가활용비 자문확인서 자문보고서 강연료청구서',source:'연구비관리 업무처리 지침 / 연구관리시스템 매뉴얼',answer:{'결론':'자문료와 특강비는 연구활동비의 전문가 활용비 성격으로 처리합니다.','필요 서류':'특강 또는 자문 계획서, 청구서, 이력서, 통장사본, 개인정보 동의서, 자문보고서 또는 강의자료, 진행 사진이나 참석자 서명부가 필요합니다.','금액 기준':'업로드 자료 기준으로 국내 특강비·강사료는 600,000원 이내, 국내 자문료는 300,000원 이내 기준이 확인됩니다.','주의':'참여연구원이나 동일 연구과제 내부 구성원에게 지급 가능한지 먼저 확인해야 합니다.'}},

];
const conv=document.getElementById('conv'),src=document.getElementById('sources'),count=document.getElementById('count'),form=document.getElementById('form'),input=document.getElementById('q');
function norm(s){return String(s||'').toLowerCase().replace(/[^0-9a-z가-힣]/g,'')}
function terms(q){return q.split(/\s+/).map(x=>x.trim()).filter(Boolean)}
function score(q,item){const t=terms(q);const compact=norm(q);const hay=norm(item.topic+' '+item.keys+' '+Object.values(item.answer).join(' '));let s=item.priority||0;t.forEach(x=>{const nx=norm(x);if(nx&&hay.includes(nx))s+=12});if(hay.includes(compact))s+=40;if(/출장|여비|출장비/.test(compact)&&/정산|서류|증빙|필요/.test(compact)&&item.topic.includes('출장 여비'))s+=200;if(/야근|특근|초과근무|식대/.test(compact)&&item.topic.includes('야근'))s+=180;if(/해외|국외|공무국외/.test(compact)&&item.topic.includes('해외'))s+=160;if(/국내|관내|관외/.test(compact)&&item.topic.includes('국내'))s+=160;if(!/야근|특근|초과근무/.test(compact)&&item.topic.includes('야근'))s-=220;return s}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function add(role,html){const a=document.createElement('article');a.className='msg '+role;a.innerHTML='<div class="bubble">'+html+'</div>';conv.appendChild(a);conv.scrollTop=conv.scrollHeight}
function answer(q){add('user',esc(q));const results=KB.map(k=>({...k,score:score(q,k)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);const top=results[0]||KB[0];let html='<strong>'+esc(top.topic)+'</strong><div class="grid">';for(const [k,v] of Object.entries(top.answer)){html+='<div class="row"><b>'+esc(k)+'</b><span>'+esc(v)+'</span></div>'}html+='</div><p><strong>근거:</strong> '+esc(top.source)+'</p>';add('assistant',html);render(results.length?results:[top])}
function render(items){count.textContent=items.length+'건';src.innerHTML=items.map(x=>'<div class="card"><h3>'+esc(x.topic)+'</h3><div class="meta"><span>점수 '+(x.score||0)+'</span><span>'+esc(x.source)+'</span></div><p>'+esc(Object.values(x.answer).slice(0,2).join(' '))+'</p></div>').join('')||'<div class="empty">검색 결과 없음</div>'}
form.addEventListener('submit',e=>{e.preventDefault();const q=input.value.trim();if(q)answer(q)});document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{input.value=b.dataset.q;answer(input.value)});document.getElementById('clear').onclick=()=>{conv.innerHTML='<article class="msg assistant"><div class="bubble"><strong>검색 준비 완료</strong><p>연구비 관련 질문을 입력하세요.</p></div></article>';render([])};render([]);
</script>
</body>
</html>
