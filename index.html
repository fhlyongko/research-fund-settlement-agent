.58}.assistant .bubble{border:1px solid var(--line);background:var(--soft)}.user .bubble{background:var(--blue);color:#fff}.bubble p{margin:8px 0 0}.grid{display:grid;gap:8px;margin-top:10px}.row{display:grid;grid-template-columns:120px 1fr;gap:10px;border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:#fff}.row b{color:var(--muted)}.composer{display:grid;grid-template-columns:1fr 92px;gap:10px;border-top:1px solid var(--line);padding:16px}.composer input{min-height:46px;border:1px solid var(--line);border-radius:8px;padding:0 14px}.composer button{border:0;border-radius:8px;background:var(--blue);color:#fff;font-weight:800}.source-head{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:20px}.source-list{overflow:auto;padding:14px}.card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:13px;margin-bottom:10px}.card h3{margin:0 0 5px;font-size:14px}.meta{display:flex;flex-wrap:wrap;gap:6px;color:var(--muted);font-size:12px}.card p{margin:10px 0 0;color:#374151;font-size:13px;line-height:1.55}mark{background:#fef3c7;border-radius:4px;padding:0 2px}.empty{color:var(--muted);padding:18px;text-align:center}@media(max-width:1080px){.app{grid-template-columns:1fr}.main{grid-template-columns:1fr}.topics{grid-template-columns:repeat(2,1fr)}.chat,.sources{min-height:auto}}@media(max-width:640px){.side,.main,.conv{padding:14px}.topics{grid-template-columns:1fr}.composer{grid-template-columns:1fr}.row{grid-template-columns:1fr}}

<script>
const KB=[
{topic:'회의비',keys:'회의비 회의 주말 사전결재 외부참석자 식사비 다과비 23시 회의록',source:'국립창원대학교 연구비관리 업무처리 지침 / 연구관리시스템 매뉴얼 / 한국연구재단 2025 Q&A',answer:{'결론':'회의비는 연구과제와 직접 관련된 실제 회의에 한해 집행합니다. 업로드 자료에서 주말 사용을 일괄 금지하는 문구는 확인되지 않지만, 식비성 회의비는 외부 참석자가 있고 사전 내부결재가 완료된 회의여야 안전합니다.','시스템 메뉴':'요구신청관리 -> 회의비사전결재','금액 기준':'식사비 1인당 50,000원 이내, 다과비 1인당 6,000원 이내. 회의비와 다과비를 동시에 집행하면 합산 1인당 50,000원 이내입니다.','필수 증빙':'사전 내부결재문서 또는 회의록, 회의 목적·일시·장소·내용·참석자 명단, 카드매출전표 또는 계좌이체 증명입니다.','주의':'23시 이후 집행, 외부 참석자 없는 식비성 회의비, 출장 식비와 중복되는 회의비는 위험합니다.'}},
{topic:'특강비',keys:'특강비 강사료 전문가활용비 강연 강사 증빙 원천징수',source:'국립창원대학교 연구비관리 업무처리 지침 / 연구관리시스템 매뉴얼',answer:{'결론':'특강비는 전문가활용비 중 강사료로 처리합니다. 연구과제와 직접 관련된 강연 목적, 강사 자격, 강연자료, 지급 근거가 확인되어야 합니다.','시스템 메뉴':'요구신청관리 -> 연구비요구신청 -> 전문가활용비 -> 강사료','금액 기준':'업로드 지침상 국내 특강비·강사료는 600,000원 이내 기준이 확인됩니다. 사업별 별도 기준이 있으면 지원기관 기준이 우선입니다.','필수 증빙':'전문가 활용 신청/내부결재, 강연자료, 강사 이력 또는 소속 확인, 개인정보 수집·이용 동의서, 지급계좌, 원천징수 관련 서류, 결과 확인 자료입니다.','주의':'참여연구자 또는 동일 연구실·최소단위 부서 소속자에게는 전문가활용비 지급이 제한됩니다.'}},
{topic:'자문료',keys:'자문료 전문가자문료 전문가활용비 자문확인서 계좌이체 원천징수',source:'국립창원대학교 연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A',answer:{'결론':'자문료는 전문가활용비 중 전문가자문료로 처리합니다. 자문 내용이 과제 수행과 직접 관련되어야 하며 자문확인서가 핵심 증빙입니다.','시스템 메뉴':'요구신청관리 -> 연구비요구신청 -> 전문가활용비 -> 전문가자문료','금액 기준':'업로드 지침상 국내 자문료는 300,000원 이내 기준이 확인됩니다. 지원기관 별도 기준이 있으면 그 기준이 우선합니다.','필수 증빙':'전문가 자문확인서, 소속 및 인적사항, 자문내역, 개인정보 수집·이용 동의서, 지급계좌, 원천징수 자료, 내부결재입니다.','주의':'참여연구자와 동일 연구개발기관 내 동일 최소단위 부서 소속자에게 전문가활용비 지급은 제한됩니다.'}},
{topic:'야근·특근 식대',keys:'야근 특근 식대 초과근무 1만원 야간 주말 카드매출전표',source:'국립창원대학교 연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A',answer:{'결론':'업로드 자료에서 확인되는 항목은 현금성 야근수당이 아니라 야근·특근 식대입니다.','시스템 메뉴':'연구비카드 사용 건 또는 연구비요구신청에서 야근·특근 식대 증빙을 첨부합니다.','금액 기준':'1인당 10,000원 이내입니다. 지원기관 지침이 따로 있으면 지원기관 기준이 우선합니다.','필수 증빙':'카드매출전표 또는 계좌이체증명, 지출결의서, 초과근무내역 확인서류, 자체규정입니다.','주의':'평일 점심, 23시 이후 부적정 사용, 출장 식비와 중복되는 식대는 정산 위험 항목입니다.'}},
{topic:'국내출장',keys:'국내출장 국내학회 학회등록비 숙박 교통 운임 일비 식비 출장신청서',source:'국립창원대학교 연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A / 연구관리시스템 매뉴얼',answer:{'결론':'국내학회 출장은 과제와 직접 관련된 참여연구자의 학회 참석·발표 목적일 때 집행 가능합니다. 출장 전 소속기관장의 출장 승인이 필요합니다.','시스템 메뉴':'출장신청 후 연구비카드 사용 등록 또는 연구비요구신청에서 학회등록비·출장여비 증빙을 첨부합니다.','금액 기준':'운임과 숙박비는 실비 정산, 일비와 식비는 공무원 여비 규정 또는 기관 자체규정에 따릅니다. 학회 제공 식사나 회의비 집행이 있으면 식비를 감액합니다.','필수 증빙':'출장신청서 사본, 여비집행내역서, 왕복 운임 및 숙박비 영수증, 학회 프로그램 또는 참가확인서, 학회등록비 영수증입니다.','주의':'자가 운임은 원칙적으로 대중교통 운임 기준이며, 특별 사유가 있을 때만 유류비 청구가 가능합니다.'}},
{topic:'해외출장',keys:'해외출장 국외출장 해외학회 발표 국외여비 출입국 환율 여권 보고서',source:'국립창원대학교 연구비관리 업무처리 지침 / 한국연구재단 2025 Q&A',answer:{'결론':'해외학회 발표 참석은 연구계획서에 반영되어 있거나 승인된 연구목적 출장이어야 하며, 공무국외여행 사전 허가와 출장 후 보고가 필요합니다.','시스템 메뉴':'공무국외여행 허가 후 연구비요구신청 또는 카드사용등록에서 국외여비 증빙을 첨부합니다.','금액 기준':'운임·숙박비·준비금은 실비 증빙, 일비·식비는 공무원 여비 규정 또는 기관 자체규정에 따릅니다. 환율은 공무국외 허가일자 기준 현찰 살 때 환율을 사용합니다.','필수 증빙':'공무국외여행 허가공문, 여비집행내역서, 출장자·기간·장소·목적·여비산출내역·세부일정, 왕복운임·숙박비·준비금 증빙, 환율표, 여권 사본 또는 출입국확인서, 프로그램 또는 참가확인서, 발표자료입니다.','주의':'연구계획서에 없거나 당초 내역과 다른 국외출장은 원칙적으로 집행할 수 없으며, 자체 변경 가능 또는 지원기관 승인 시 예외가 가능합니다.'}},
{topic:'기자재 구매',keys:'기자재 장비 맥미니 컴퓨터 중앙구매 연구실운영비 연구시설 장비 200만원',source:'국립창원대학교 연구비관리 업무처리 지침 / 연구지원INFO / 한국연구재단 2025 Q&A',answer:{'결론':'맥미니 같은 컴퓨터는 곧바로 연구시설·장비비로 단정하지 말고 연구계획서와 실행예산표의 계상 비목을 먼저 확인해야 합니다. 일반 컴퓨터·주변기기는 연구실운영비 또는 연구활동비 성격으로 검토되는 경우가 많습니다.','시스템 메뉴':'물품구매신청 또는 연구비요구신청에서 중앙구매 여부를 확인합니다.','금액 기준':'200만원 내외 물품은 기관 중앙구매 기준, 비교견적, 검수 기준을 확인해야 합니다. 지원기관·산학협력단 기준이 우선합니다.','필수 증빙':'구매의뢰서, 과제 직접 관련성 설명, 견적서 또는 비교견적, 거래명세서, 카드매출전표·세금계산서·계좌이체증명, 계약서 해당 시, 검수완료 확인서입니다.','주의':'연구 종료 직전 구매, 개인용 사용 가능성이 큰 물품, 계획서와 비목이 맞지 않는 구매는 정산 위험이 큽니다.'}}
];
const conv=document.getElementById('conv'),src=document.getElementById('sources'),count=document.getElementById('count'),form=document.getElementById('form'),input=document.getElementById('q');
function score(q,item){const terms=q.toLowerCase().split(/\s+/).filter(Boolean);const hay=(item.topic+' '+item.keys+' '+Object.values(item.answer).join(' ')).toLowerCase();return terms.reduce((s,t)=>s+(hay.includes(t)?3:0),0)+(hay.includes(q.toLowerCase())?5:0)}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function add(role,html){const a=document.createElement('article');a.className='msg '+role;a.innerHTML='<div class="bubble">'+html+'</div>';conv.appendChild(a);conv.scrollTop=conv.scrollHeight}
function answer(q){add('user',esc(q));const results=KB.map(k=>({...k,score:score(q,k)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);const top=results[0]||KB[0];let html='<strong>'+esc(top.topic)+'</strong><div class="grid">';for(const [k,v] of Object.entries(top.answer)){html+='<div class="row"><b>'+esc(k)+'</b><span>'+esc(v)+'</span></div>'}html+='</div><p><strong>근거:</strong> '+esc(top.source)+'</p>';add('assistant',html);render(results.length?results:[top])}
function render(items){count.textContent=items.length+'건';src.innerHTML=items.map(x=>'<div class="card"><h3>'+esc(x.topic)+'</h3><div class="meta"><span>점수 '+(x.score||0)+'</span><span>'+esc(x.source)+'</span></div><p>'+esc(Object.values(x.answer).slice(0,2).join(' '))+'</p></div>').join('')||'<div class="empty">검색 결과 없음</div>'}
form.addEventListener('submit',e=>{e.preventDefault();const q=input.value.trim();if(q)answer(q)});document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{input.value=b.dataset.q;answer(input.value)});document.getElementById('clear').onclick=()=>{conv.innerHTML='<article class="msg assistant"><div class="bubble"><strong>검색 준비 완료</strong><p>연구비 관련 질문을 입력하세요.</p></div></article>';render([])};render([]);
</script>
</body>
</html>
